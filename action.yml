name: 'Tessl Smart Publish'
description: 'Publish a tessl tile, auto-bumping patch from the registry'

inputs:
  path:
    description: 'Path to the tile directory (default: repo root)'
    required: false
    default: '.'

outputs:
  version:
    description: 'The version that was published'
    value: ${{ steps.publish.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Smart publish
      id: publish
      shell: bash
      run: |
        TILE_PATH="${{ inputs.path }}"
        TILE_JSON="$TILE_PATH/tile.json"
        TILE_NAME=$(jq -r .name "$TILE_JSON")

        # Query registry for the latest published version
        LATEST=$(tessl tile info "$TILE_NAME" 2>/dev/null | grep 'Latest Version' | awk '{print $NF}')
        if [ -n "$LATEST" ]; then
          BASE="$LATEST"
        else
          # First publish — use version from tile.json
          BASE=$(jq -r .version "$TILE_JSON")
          # Subtract 1 from patch so the bump lands on the tile.json version
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          BASE="$MAJOR.$MINOR.$((PATCH - 1))"
        fi

        MAJOR=$(echo "$BASE" | cut -d. -f1)
        MINOR=$(echo "$BASE" | cut -d. -f2)
        PATCH=$(echo "$BASE" | cut -d. -f3)
        NEXT="$MAJOR.$MINOR.$((PATCH + 1))"

        echo "Registry: $LATEST → publishing $NEXT"
        jq --arg v "$NEXT" '.version = $v' "$TILE_JSON" > "$TILE_JSON.tmp" && mv "$TILE_JSON.tmp" "$TILE_JSON"
        tessl tile publish "$TILE_PATH"
        echo "version=$NEXT" >> "$GITHUB_OUTPUT"

        # Commit the bumped version back to the repo
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add "$TILE_JSON"
        git diff --cached --quiet || {
          git commit -m "Bump $TILE_NAME to $NEXT [skip ci]"
          git push
        }
